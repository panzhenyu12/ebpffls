name: ransomware-default
description: Conservative ransomware behavior policy inspired by Tetragon tracing policies.
window: 10s
threshold: 45
action: kill
block_ttl: 10m
protected_dirs:
  - /home
  - /root
  - /srv
  - /var/www
  - /mnt
  - /media
backup_dirs:
  - /backup
  - /backups
  - /.snapshot
  - /var/backups
self_protect_paths:
  - /usr/local/bin/ebpffls
  - /usr/bin/ebpffls
  - /root/ebpffls/bin/ebpffls
  - /etc/systemd/system/ebpffls.service
trusted_processes:
  - ebpffls
  - apt
  - apt-get
  - dpkg
  - snapd
  - systemd
  - journald
  - rsync
  - tar
  - gzip
  - bzip2
  - xz
  - backup
trusted_exe_paths:
  - /usr/bin/apt
  - /usr/bin/apt-get
  - /usr/bin/dpkg
  - /usr/bin/rsync
  - /usr/bin/tar
  - /usr/bin/gzip
  - /usr/bin/bzip2
  - /usr/bin/xz
  - /usr/lib/snapd/snapd
  - /lib/systemd/systemd
  - /usr/lib/systemd/systemd
  - /lib/systemd/systemd-journald
  - /usr/lib/systemd/systemd-journald
  - /usr/local/bin/ebpffls
  - /usr/bin/ebpffls
  - /root/ebpffls/bin/ebpffls
trusted_uids:
  - 0
blacklist_scan: 5s
blacklist_hashes: []
blacklist_hash_files:
  - configs/blacklist.txt
suspicious_extensions:
  - .locked
  - .encrypted
  - .crypt
  - .crypto
  - .enc
  - .pay
  - .ransom
ransom_note_names:
  - README_FOR_DECRYPT.txt
  - README_TO_DECRYPT.txt
  - DECRYPT_INSTRUCTIONS.txt
  - RECOVER_FILES.txt
  - RECOVER_FILES.html
  - HOW_TO_DECRYPT.txt
scores:
  write: 1
  truncate: 6
  rename: 8
  unlink: 8
  self_protect: 50
  suspicious_extension: 10
  ransom_note: 20
  backup_destroy: 20
  high_rate_bonus: 15
  exec_after_blocked: 10
  scan: 1
  mmap: 3
  io_uring: 1
  network_egress: 5
network_egress:
  enabled: false
  score: 5
  allowed_cidrs:
    - 127.0.0.0/8
    - ::1/128
  allowed_ports:
    - 53
